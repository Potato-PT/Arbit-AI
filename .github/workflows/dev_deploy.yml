name: GCP AI Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: ['main']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: GCP-arbit-ai-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare-deploy:
    name: Prepare Deploy Bundle
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    env:
      REMOTE_APP_DIR: /home/lalalove0310/arbit-ai
      DOCKER_NETWORK: arbit-net
      DOCKER_IMAGE: arbit-ai:latest
      DOCKER_CONTAINER: arbit-ai
      DOCKER_NETWORK_ALIAS: arbit-ai
      APP_PORT: 8000
      HOST_PORT: 8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Deploy Bundle
        env:
          ARBIT_DB_PROFILE: gcp
          GCP_DB_URL: ${{ vars.GCP_DB_URL }}
          GCP_DB_USERNAME: ${{ vars.GCP_DB_USERNAME }}
          GCP_DB_PASSWORD: ${{ secrets.GCP_DB_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME || 'deepflow-image-storage' }}
          GCS_PUBLIC_BASE_URL: ${{ vars.GCS_PUBLIC_BASE_URL || 'https://storage.googleapis.com/deepflow-image-storage' }}
        run: |
          mkdir -p deploy
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude '.venv' \
            --exclude 'venv' \
            --exclude 'deploy' \
            ./ deploy/

          {
            echo "ARBIT_DB_PROFILE=${ARBIT_DB_PROFILE}"
            echo "GCP_DB_URL=${GCP_DB_URL}"
            echo "GCP_DB_USERNAME=${GCP_DB_USERNAME}"
            echo "GCP_DB_PASSWORD=${GCP_DB_PASSWORD}"
            echo "GEMINI_API_KEY=${GEMINI_API_KEY}"
            echo "GCS_BUCKET_NAME=${GCS_BUCKET_NAME}"
            echo "GCS_PUBLIC_BASE_URL=${GCS_PUBLIC_BASE_URL}"
          } > deploy/.env

      - name: Set Up SSH
        env:
          GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
        run: |
          set -e

          echo "::group::SSH input check"
          if [ -z "${{ vars.GCP_HOST }}" ]; then
            echo "GCP_HOST repository variable is empty"
            exit 1
          fi
          if [ -z "${{ vars.GCP_USERNAME }}" ]; then
            echo "GCP_USERNAME repository variable is empty"
            exit 1
          fi
          if [ -z "$GCP_SSH_KEY" ]; then
            echo "GCP_SSH_KEY secret is empty"
            exit 1
          fi
          echo "GCP_HOST=${{ vars.GCP_HOST }}"
          echo "GCP_PORT=${{ vars.GCP_PORT || 22 }}"
          echo "GCP_USERNAME=${{ vars.GCP_USERNAME }}"
          echo "GCP_SSH_KEY is present"
          echo "::endgroup::"

          echo "::group::Create SSH key file"
          mkdir -p ~/.ssh
          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ls -ld ~/.ssh
          ls -l ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null
          echo "SSH private key format is valid"
          echo "::endgroup::"

          echo "::group::Add host key"
          ssh-keyscan -v -T 15 -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_HOST }}" 2>&1 | tee /tmp/ssh-keyscan.log
          ssh-keyscan -T 15 -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_HOST }}" >> ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts || { echo "known_hosts is empty after ssh-keyscan"; exit 1; }
          echo "known_hosts line count: $(wc -l < ~/.ssh/known_hosts)"
          echo "::endgroup::"

      - name: Test SSH Connection
        run: |
          set -e
          ssh -vvv \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -p "${{ vars.GCP_PORT || 22 }}" \
            "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}" \
            "echo 'SSH connection succeeded'; whoami; hostname; pwd"

      - name: Ensure Remote Directory
        run: |
          ssh -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}" "
            mkdir -p '${REMOTE_APP_DIR}'
          "

      - name: Sync Deploy Bundle To Server
        run: |
          rsync -avz --delete -e "ssh -p ${{ vars.GCP_PORT || 22 }}" deploy/ "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}:${REMOTE_APP_DIR}/"

  build-and-restart:
    name: Build And Restart
    runs-on: ubuntu-latest
    needs: prepare-deploy

    env:
      REMOTE_APP_DIR: /home/lalalove0310/arbit-ai
      DOCKER_NETWORK: arbit-net
      DOCKER_IMAGE: arbit-ai:latest
      DOCKER_CONTAINER: arbit-ai
      DOCKER_NETWORK_ALIAS: arbit-ai
      APP_PORT: 8000
      HOST_PORT: 8000

    steps:
      - name: Set Up SSH
        env:
          GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
        run: |
          set -e

          echo "::group::SSH input check"
          if [ -z "${{ vars.GCP_HOST }}" ]; then
            echo "GCP_HOST repository variable is empty"
            exit 1
          fi
          if [ -z "${{ vars.GCP_USERNAME }}" ]; then
            echo "GCP_USERNAME repository variable is empty"
            exit 1
          fi
          if [ -z "$GCP_SSH_KEY" ]; then
            echo "GCP_SSH_KEY secret is empty"
            exit 1
          fi
          echo "GCP_HOST=${{ vars.GCP_HOST }}"
          echo "GCP_PORT=${{ vars.GCP_PORT || 22 }}"
          echo "GCP_USERNAME=${{ vars.GCP_USERNAME }}"
          echo "GCP_SSH_KEY is present"
          echo "::endgroup::"

          echo "::group::Create SSH key file"
          mkdir -p ~/.ssh
          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ls -ld ~/.ssh
          ls -l ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null
          echo "SSH private key format is valid"
          echo "::endgroup::"

          echo "::group::Add host key"
          ssh-keyscan -v -T 15 -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_HOST }}" 2>&1 | tee /tmp/ssh-keyscan.log
          ssh-keyscan -T 15 -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_HOST }}" >> ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts || { echo "known_hosts is empty after ssh-keyscan"; exit 1; }
          echo "known_hosts line count: $(wc -l < ~/.ssh/known_hosts)"
          echo "::endgroup::"

      - name: Test SSH Connection
        run: |
          set -e
          ssh -vvv \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -p "${{ vars.GCP_PORT || 22 }}" \
            "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}" \
            "echo 'SSH connection succeeded'; whoami; hostname; pwd"

      - name: Build And Restart
        run: |
          ssh -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}" "
            set -e
            mkdir -p '${REMOTE_APP_DIR}'
            cd '${REMOTE_APP_DIR}'
            ls -la
            test -f Dockerfile || { echo 'Dockerfile not found after rsync'; exit 1; }

            docker network inspect '${DOCKER_NETWORK}' >/dev/null 2>&1 || docker network create '${DOCKER_NETWORK}'
            docker build -t '${DOCKER_IMAGE}' .

            docker rm -f '${DOCKER_CONTAINER}' >/dev/null 2>&1 || true

            ENV_FILE_ARG=''
            if [ -f .env ]; then
              ENV_FILE_ARG='--env-file .env'
            fi

            docker run -d \
              --name '${DOCKER_CONTAINER}' \
              --network '${DOCKER_NETWORK}' \
              --network-alias '${DOCKER_NETWORK_ALIAS}' \
              --restart unless-stopped \
              -p 127.0.0.1:${HOST_PORT}:${APP_PORT} \
              \$ENV_FILE_ARG \
              '${DOCKER_IMAGE}'

            docker ps --filter name='${DOCKER_CONTAINER}'
          "

      - name: Health Check
        run: |
          ssh -p "${{ vars.GCP_PORT || 22 }}" "${{ vars.GCP_USERNAME }}@${{ vars.GCP_HOST }}" "
            set -e
            for i in \$(seq 1 30); do
              if docker exec '${DOCKER_CONTAINER}' python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${APP_PORT}/health', timeout=2).read()\"; then
                docker logs --tail=100 '${DOCKER_CONTAINER}'
                exit 0
              fi
              sleep 2
            done

            docker ps -a --filter name='${DOCKER_CONTAINER}'
            docker logs --tail=200 '${DOCKER_CONTAINER}'
            exit 1
          "
